<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Noir Portfolio</title>
    <!-- Google Fonts for cinematic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Canvas for Dynamic Polygons -->
    <canvas id="polygon-bg"></canvas>

    <!-- Cinematic Navigation -->
    <nav class="site-nav" id="site-nav">
        <div class="nav-links">
            <a href="#skills-preview" class="nav-link" data-section="skills-preview">Skills</a>
            <a href="#projects-preview" class="nav-link" data-section="projects-preview">Projects</a>
            <a href="#experience" class="nav-link" data-section="experience">Experience</a>
            <a href="#achievements" class="nav-link" data-section="achievements">Achievements</a>
            <span class="nav-indicator"></span>
        </div>
    </nav>
    
    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="hero-name">Bhavesh Patil</h1>
            <p class="hero-tagline" id="hero-title">Software Developer.</p>
            <p class="hero-subtitle" id="hero-tagline"></p>

            <!-- Minimal Noir Avatar -->
            <div class="hero-avatar">
                <svg viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg" fill="none">
                    <defs>
                        <!-- Subtle shadow gradient beneath eyes -->
                        <radialGradient id="eye-shadow-l" cx="50%" cy="0%" r="80%">
                            <stop offset="0%" stop-color="#8c8c8c" stop-opacity="0.08"/>
                            <stop offset="100%" stop-color="#8c8c8c" stop-opacity="0"/>
                        </radialGradient>
                        <radialGradient id="eye-shadow-r" cx="50%" cy="0%" r="80%">
                            <stop offset="0%" stop-color="#8c8c8c" stop-opacity="0.08"/>
                            <stop offset="100%" stop-color="#8c8c8c" stop-opacity="0"/>
                        </radialGradient>
                        <!-- Clip paths to hide pupils outside the eyes during blink -->
                        <clipPath id="clip-eye-l">
                            <path id="clip-path-l" d="M16 36 Q42 18 68 36 Q42 52 16 36Z" />
                        </clipPath>
                        <clipPath id="clip-eye-r">
                            <path id="clip-path-r" d="M92 36 Q118 18 144 36 Q118 52 92 36Z" />
                        </clipPath>
                    </defs>
                    <!-- Left eyebrow — thick tapered arc -->
                    <path d="M18 24 Q42 8 66 22 Q42 14 18 24Z" fill="#9a9a9a" opacity="0.45"/>
                    <!-- Left eye shadow -->
                    <ellipse cx="42" cy="48" rx="22" ry="10" fill="url(#eye-shadow-l)"/>
                    <!-- Left eye — big almond -->
                    <path id="eye-left" d="M16 36 Q42 18 68 36 Q42 52 16 36Z" stroke="#8c8c8c" stroke-width="1.2"/>
                    <!-- Left pupil -->
                    <circle id="pupil-left" cx="42" cy="36" r="6" fill="#8c8c8c" clip-path="url(#clip-eye-l)"/>

                    <!-- Right eyebrow — thick tapered arc -->
                    <path d="M94 22 Q118 8 142 24 Q118 14 94 22Z" fill="#9a9a9a" opacity="0.45"/>
                    <!-- Right eye shadow -->
                    <ellipse cx="118" cy="48" rx="22" ry="10" fill="url(#eye-shadow-r)"/>
                    <!-- Right eye — big almond -->
                    <path id="eye-right" d="M92 36 Q118 18 144 36 Q118 52 92 36Z" stroke="#8c8c8c" stroke-width="1.2"/>
                    <!-- Right pupil -->
                    <circle id="pupil-right" cx="118" cy="36" r="6" fill="#8c8c8c" clip-path="url(#clip-eye-r)"/>
                </svg>
            </div>
            <div class="hero-actions">
                <a href="#" class="ui-btn primary hero-btn" id="btn-view-resume" target="_blank">View Resume</a>
            </div>
        </div>
        <div class="hero-spacer"></div>
    </header>

    <main>
        <!-- Interactive Skills Bubbles -->
        <section id="skills-preview" class="skills-preview">
            <div class="container">
                <div class="skills-bubble-area" id="skills-bubble-area"></div>
            </div>
        </section>

        <!-- Projects Preview -->
        <section id="projects-preview" class="projects-preview">
            <div class="container">
                <h2 class="section-title">Selected Works</h2>
                <div class="projects-preview-grid" id="projects-preview-grid"></div>
            </div>
        </section>

        <!-- Experience Timeline -->
        <section id="experience" class="experience-section">
            <div class="container">
                <h2 class="section-title">Experience</h2>
                <div class="timeline" id="experience-timeline"></div>
            </div>
        </section>



        <!-- Achievements Showcase -->
        <section id="achievements" class="achievements-section">
            <div class="container">
                <h2 class="section-title">Achievements</h2>
                <div class="metal-rack" id="metal-rack"></div>
            </div>
        </section>

    </main>

    <!-- Project Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-panel" id="modal-panel">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 class="modal-title" id="modal-title"></h2>
            <p class="modal-desc" id="modal-desc"></p>
            <div class="modal-tech" id="modal-tech"></div>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <!-- GSAP for cinematic animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
